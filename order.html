<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Calculator | Polish Water Ice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="order.css">
</head>
<body>

  <nav class="order-nav">
    <a href="index.html" class="logo">Polish Water Ice</a>
    <span class="nav-title">Order Calculator</span>
  </nav>

  <main class="order-app">
    <div class="order-builder">
      <h1>Build Your Order</h1>

      <!-- Step 1: Category -->
      <div class="builder-card">
        <h2>1. Choose a Treat</h2>

        <div class="category-group">
          <h3 class="category-label">Dairy Free Treats</h3>
          <div class="category-options">
            <button class="cat-btn" data-category="water-ice">
              <span class="cat-emoji">🍧</span>
              <span class="cat-name">Polish Water Ice</span>
              <span class="cat-desc">Smoother & creamier than regular water ice</span>
            </button>
            <button class="cat-btn" data-category="slushie">
              <span class="cat-emoji">🥤</span>
              <span class="cat-name">Slushie</span>
              <span class="cat-desc">Frozen blended drink</span>
            </button>
            <button class="cat-btn" data-category="ice-cap">
              <span class="cat-emoji">🧊</span>
              <span class="cat-name">Ice Cap</span>
              <span class="cat-desc">Water ice mixed with soda of your choice</span>
            </button>
          </div>
        </div>

        <div class="category-group">
          <h3 class="category-label">Dairy Treats</h3>
          <div class="category-options">
            <button class="cat-btn" data-category="polish-freeze">
              <span class="cat-emoji">🍨</span>
              <span class="cat-name">Polish Freeze</span>
              <span class="cat-desc">Water ice flavor mixed with ice cream</span>
            </button>
            <button class="cat-btn" data-category="ice-cream-cup">
              <span class="cat-emoji">🍦</span>
              <span class="cat-name">Ice Cream Cup</span>
              <span class="cat-desc">Chocolate, Vanilla, or mix</span>
            </button>
            <button class="cat-btn" data-category="ice-cream-cone">
              <span class="cat-emoji">🍦</span>
              <span class="cat-name">Ice Cream Cone</span>
              <span class="cat-desc">Regular or waffle cone</span>
            </button>
            <button class="cat-btn" data-category="chiller">
              <span class="cat-emoji">🥤</span>
              <span class="cat-name">Chiller</span>
              <span class="cat-desc">Ice cream blended with candy of your choice</span>
            </button>
            <button class="cat-btn" data-category="milkshake">
              <span class="cat-emoji">🥛</span>
              <span class="cat-name">Milkshake</span>
              <span class="cat-desc">Classic milkshake</span>
            </button>
            <button class="cat-btn" data-category="float">
              <span class="cat-emoji">🍺</span>
              <span class="cat-name">Float</span>
              <span class="cat-desc">Root Beer, Pepsi & more</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Step 2: Size (dynamic) -->
      <div class="builder-card" id="sizeCard" style="display:none;">
        <h2>2. Pick a Size</h2>
        <div class="size-options" id="sizeOptions"></div>
      </div>

      <!-- Step 3: Cone type (ice cream cone only) -->
      <div class="builder-card" id="coneCard" style="display:none;">
        <h2>2. Cone Type</h2>
        <div class="size-options" id="coneOptions"></div>
      </div>

      <!-- Step 4: Add-ons -->
      <div class="builder-card" id="addonsCard" style="display:none;">
        <h2 id="addonsTitle">3. Add-ons</h2>
        <div class="topping-options" id="addonOptions"></div>
      </div>

      <!-- Step 5: Quantity -->
      <div class="builder-card" id="qtyCard" style="display:none;">
        <h2 id="qtyTitle">3. Quantity</h2>
        <div class="qty-control">
          <button class="qty-btn" id="qtyMinus">-</button>
          <span class="qty-value" id="qtyValue">1</span>
          <button class="qty-btn" id="qtyPlus">+</button>
        </div>
      </div>

      <button class="add-to-order-btn" id="addToOrder" disabled>Add to Order</button>
    </div>

    <div class="order-summary">
      <h2>Order Summary</h2>
      <div class="order-items" id="orderItems">
        <p class="empty-order">No items yet. Build something delicious!</p>
      </div>
      <div class="order-totals" id="orderTotals" style="display:none;">
        <div class="total-row">
          <span>Subtotal</span>
          <span id="subtotal">$0.00</span>
        </div>
        <div class="total-row">
          <span>Tax (8.625%)</span>
          <span id="tax">$0.00</span>
        </div>
        <div class="total-row total-final">
          <span>Total</span>
          <span id="total">$0.00</span>
        </div>
      </div>
      <button class="clear-order-btn" id="clearOrder" style="display:none;">Clear Order</button>
    </div>
  </main>

  <script src="order.js"></script>
</body>
</html>
